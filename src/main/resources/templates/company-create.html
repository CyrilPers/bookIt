<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Création d'une entreprise</h1>
<form action="/api/company/create" method="post">
    <label for="name">Nom de l'entreprise</label>
    <input type="text" id="name" name="name" required>
    <label for="siret">Siret</label>
    <input type="text" id="siret" name="siret" required>
    <label for="description">Description</label>
    <textarea type="text" id="description" name="description" ></textarea>
    <label for="categories">Services</label>
    <select multiple name="categories" id="categories">
        <th:block th:each="category : ${categories}">
            <option th:value="${category.id}" th:text="${category.label}"></option>
        </th:block>
    </select>

    <input type="submit" value="Créer">
</form>

</body>
</html>
